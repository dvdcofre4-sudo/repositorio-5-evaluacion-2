<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Evaluación Sumativa 2</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS propio -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <header class="navbar sticky-top bg-dark flex-md-nowrap p-0 shadow">
    <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3 fs-6 text-white" href="#">
      Evaluación Front End
    </a>

    <div class="navbar-nav">
      <div class="nav-item text-nowrap">
        <a class="nav-link px-3 text-white" href="index.html">
          Cerrar sesión
        </a>
      </div>
    </div>
  </header>

  <div class="container-fluid">
    <div class="row">

      <!-- Menú lateral estilo dashboard -->
      <div class="sidebar border border-right col-md-3 col-lg-2 p-0 bg-body-tertiary">
        <div class="offcanvas-md offcanvas-end bg-body-tertiary">
          <div class="offcanvas-body d-md-flex flex-column p-0 pt-lg-3 overflow-y-auto">

            <ul class="nav flex-column">
              <li class="nav-item">
                <a class="nav-link active" href="#">
                  Inicio
                </a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="#">
                  Estados
                </a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="#">
                  Reportes
                </a>
              </li>
            </ul>

          </div>
        </div>
      </div>

      <!-- Contenido central del dashboard -->
      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
          <h1 class="h2">Dashboard</h1>
        </div>

        <section class="contenedor-dashboard">

          <button id="btnPresioname" class="btn btn-primary btn-lg mb-4">
            presióname <span id="numeroBoton">15</span>
          </button>

          <div id="cardEstado" class="card text-bg-primary mb-3 card-evaluacion">

            <div id="cardHeader" class="card-header">
              Estado inicial
            </div>

            <div class="card-body text-center">

              <div id="cardImagen" class="imagen-card mb-3">
                🟦
              </div>

              <h5 id="cardTitulo" class="card-title">
                Sistema en estado normal
              </h5>

              <p id="cardDescripcion" class="card-text">
                El sistema está funcionando correctamente. El contador se encuentra en una zona segura.
              </p>

            </div>

            <div id="cardFooter" class="card-footer">
              Número actual: 15
            </div>

          </div>

        </section>

      </main>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JavaScript propio -->
  <script src="js/dashboard.js"></script>
</body>
</html>
