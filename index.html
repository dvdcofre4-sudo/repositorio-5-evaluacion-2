<!doctype html>
<html lang="es" data-bs-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Evaluación Sumativa 2</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS propio -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="body-login">

  <main class="form-signin text-center">
    <form id="formLogin">

      <img id="logoLogin" class="logo-login mb-4" src="img/logo-ok.svg" alt="Logo login">
      
      <h1 class="h3 mb-3 fw-normal">Inicio de sesión</h1>

      <div id="mensajeLogin"></div>

      <div class="form-floating mb-2">
        <input type="text" class="form-control" id="usuario" placeholder="Usuario">
        <label for="usuario">Usuario</label>
      </div>

      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="password" placeholder="Contraseña">
        <label for="password">Contraseña</label>
      </div>

      <button id="btnIngresar" class="btn btn-primary w-100 py-2" type="submit">
        Ingresar
      </button>

      <p class="mt-4 mb-3 text-body-secondary">
        Usuario: David | Contraseña: D4v1dc0fr3
      </p>

    </form>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JavaScript propio -->
  <script src="js/login.js"></script>
</body>
</html>
